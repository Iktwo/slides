name: Deploy Compose Multiplatform WASM to GitHub Pages

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # or 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build the production WebAssembly artifacts
      - name: Build WASM Production Distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution || ./gradlew :composeApp:wasmJsBrowserProductionExecutableDist

      # 2. Inject the GitHub Pages base path dynamically into the compiled HTML
      # This keeps your local development file clean.
      - name: Inject GitHub Pages Base Path
        run: |
          DIST_DIR="composeApp/build/dist/wasmJs/productionExecutable"
          if [ -d "$DIST_DIR" ]; then
            # Inject <base href="/slides/"> right after the <head> tag
            sed -i 's|<head>|<head><base href="/slides/">|g' "$DIST_DIR/index.html"
          else
            echo "Error: Production distribution directory not found!"
            exit 1
          fi

      # 3. Setup Pages Configuration
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. Upload the official Kotlin distribution directory with all styles intact
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'composeApp/build/dist/wasmJs/productionExecutable/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4